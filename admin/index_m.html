<html>

<head>

	<!-- Load ioBroker scripts and styles-->
	<link rel="stylesheet" type="text/css" href="../../css/adapter.css" />
	<link rel="stylesheet" type="text/css" href="../../lib/css/materialize.css">

	<script type="text/javascript" src="../../lib/js/jquery-3.2.1.min.js"></script>
	<script type="text/javascript" src="../../socket.io/socket.io.js"></script>

	<script type="text/javascript" src="../../js/translate.js"></script>
	<script type="text/javascript" src="../../lib/js/materialize.js"></script>
	<script type="text/javascript" src="../../js/adapter-settings.js"></script>

	<!-- Load our own files -->
	<link rel="stylesheet" type="text/css" href="style.css" />
	<script type="text/javascript" src="words.js"></script>

	<script type="text/javascript">
		// This will be called by the admin adapter when the settings page loads
		function load(settings, onChange) {
			if (!settings) return;
			if (!settings.retrievalType) { settings.retrievalType = "average"; }
			if (!settings.retrievalRate) { settings.retrievalRate = 10; } 
            if (settings.respectNightMode === undefined) { settings.respectNightMode = true; }
			

			$(".value").each(function() {
				var $key = $(this);
				var id = $key.attr("id");
				$key.val(settings[id])
					.on("change", () => onChange())
					.on("keyup", () => onChange());
				$key.prop("checked", settings[id]).on("change", () => onChange());
			});

			$("#connectViaIP").on("change", () => {
				disableIPInput();
				onChange();
			});
			$("#retrievalRate").on("change", () => {
				limitRetrievalRate($("#retrievalRate").val());
				onChange();
			});
			$("#showPassword").on("change", () => {
				togglePassword();
				onChange();
			});
			hidePassword();
			disableIPInput();
			onChange(false);
			if (M) M.updateTextFields();
		}

		function disableIPInput() {
			if ($("#connectViaIP").prop("checked")) {
				$("#searchOptionIp").removeClass("disabled");
				$("#searchOptionId").addClass("disabled", true);

			} else {
				$("#searchOptionIp").addClass("disabled", true);
				$("#searchOptionId").removeClass("disabled");
			}
		}

		function hidePassword() {
			$("#password").attr("type", "password");
			$("#showPassword").prop("checked", false);
		}

		function togglePassword() {
			if ($("#password").attr("type") === "password") {
				$("#password").attr("type", "text");
			} else {
				$("#password").attr("type", "password");
			}
		}

		/**
		 * Sends a "discoverDevices" message to the running adapter instance.
		 * The adapter performs a 10-second mDNS scan and returns all air-Q
		 * devices it finds. We then display them in a list below the button.
		 */
		function scanNetwork() {
			// Disable the button and show a "scanning" message
			$("#scanBtn").prop("disabled", true);
			$("#scanResults").empty();
			$("#scanStatusText").text(translateWord("scan_running_txt"));
			$("#scanStatus").show();

			// sendTo talks to the adapter's onMessage handler.
			// Parameters: adapter.instance, command, payload, callback
			sendTo(adapter + "." + instance, "discoverDevices", {}, function (result) {
				$("#scanBtn").prop("disabled", false);
				$("#scanStatus").hide();
				var container = $("#scanResults");
				container.empty();

				if (!result || !result.devices || result.devices.length === 0) {
					container.append(
						'<li class="collection-item">' +
							'<span class="translate">' + translateWord("scan_no_devices_txt") + '</span>' +
						'</li>'
					);
					return;
				}

				// Show hint that devices are clickable
				container.append(
					'<li class="collection-item grey lighten-3">' +
						'<i>' + translateWord("scan_select_hint_txt") + '</i>' +
					'</li>'
				);

				// Add each found device as a clickable list item
				for (var i = 0; i < result.devices.length; i++) {
					var dev = result.devices[i];
					var li = $(
						'<li class="collection-item clickable-device" style="cursor:pointer">' +
							'<b>' + escapeHtml(dev.name || dev.shortId + "_air-q") + '</b>' +
							'<br/><small>ID: ' + escapeHtml(dev.shortId) + ' &mdash; IP: ' + escapeHtml(dev.address) + '</small>' +
						'</li>'
					);
					// Closure to capture dev for the click handler
					(function(device) {
						li.on("click", function() {
							// Fill in both shortId and deviceIP fields
							$("#shortId").val(device.shortId).trigger("change");
							$("#deviceIP").val(device.address).trigger("change");
							// Flash the row green briefly to confirm selection
							$(this).css("background-color", "#c8e6c9");
							setTimeout(function() {
								li.css("background-color", "");
							}, 800);
							if (M) M.updateTextFields();
						});
					})(dev);
					container.append(li);
				}
			});
		}

		/** Simple HTML escaping to prevent XSS from device names */
		function escapeHtml(str) {
			if (!str) return "";
			return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
		}

		/**
		 * Returns a translated string for the current language.
		 * Falls back to English if the current language is not available.
		 */
		function translateWord(key) {
			if (systemDictionary && systemDictionary[key]) {
				var lang = systemLang || "en";
				return systemDictionary[key][lang] || systemDictionary[key]["en"] || key;
			}
			return key;
		}

		function save(callback) {
			var obj = {};
			$(".value").each(function() {
				var $this = $(this);
				if ($this.attr("type") === "checkbox") {
					obj[$this.attr("id")] = $this.prop("checked");
				} else if ($this.attr("type") === "number") {
					obj[$this.attr("id")] = parseFloat($this.val());
				} else {
					obj[$this.attr("id")] = $this.val();
				}
			});

			obj.connectViaIP = $("#connectViaIP").prop("checked");
			callback(obj);
		}

		function limitRetrievalRate(rate) {
				if (rate < 2) {
					return $("#retrievalRate").val(2);
				} else if (rate > 3600) {
					return $("#retrievalRate").val(3600);
    			}
		}

	</script>

	<style>
		.disabled {
			pointer-events: none;
			opacity: 0.4;
		}
	</style>
</head>

<body>
	<div class="m adapter-container" id="root">
		<div class="row">

			<!-- Network discovery section -->
			<div class="row" style="padding: 4px">
				<div class="col s12">
					<a class="btn waves-effect waves-light" id="scanBtn" onclick="scanNetwork()">
						<i class="material-icons left">wifi_find</i>
						<span class="translate">scan_network_txt</span>
					</a>
					<span id="scanStatus" style="display:none; margin-left: 1em; vertical-align: middle;">
						<div class="preloader-wrapper small active" style="width:20px;height:20px;vertical-align:middle">
							<div class="spinner-layer spinner-blue-only">
								<div class="circle-clipper left"><div class="circle"></div></div>
								<div class="gap-patch"><div class="circle"></div></div>
								<div class="circle-clipper right"><div class="circle"></div></div>
							</div>
						</div>
						<span id="scanStatusText"></span>
					</span>
				</div>
				<div class="col s12" style="margin-top: 8px">
					<ul class="collection" id="scanResults" style="border: none; margin: 0"></ul>
				</div>
			</div>

			<div class="row" style="padding: 4px">
				<h6 class="title" style="background-color: #174475; font-size: 1.2rem; border-radius: 4px">
					<div for="access_data" class="translate">access_data_txt</div>
				</h6>
				<div class="input-field col s12 m6">
					<input type="checkbox" class="value" id="connectViaIP" name="connectViaIP" />
					<span for="connectViaIP" class="translate">search_device_ip_txt</span></br>
					<span class="translate">connect_ip_hint_txt</span>
				</div>
				<div class="input-field col s6 m6" id="searchOptionIp">
					<input type="text" class="value" id="deviceIP" maxlength="15" />
					<label for="deviceIP" class="translate">ip_txt</label>
				</div>
			</div>

			<div class="row" style="padding: 4px">

				<div class="input-field col s6 m6" id="searchOptionId">
					<input type="text" class="value" id="shortId" maxlength="5" />
					<label for="shortId" class="translate">shortId_txt</label>
				</div>

				<div class="col s6 input-field">
					<input type="password" class="value" id="password" />
					<label for="password" class="translate">password_txt</label>
					<input type="checkbox" class="value" id="showPassword"/>
					<label for="showPassword" class="translate">password_show_txt</label>
				</div>
			</div>
			<div class="row" style="padding: 4px">
				<h6 class="title" style="background-color: #174475; font-size: 1.2rem; border-radius: 4px">
					<div for="access_data" class="translate">retrieval_txt</div>
				</h6>
			</div>

            <div class="row" style="padding: 4px">
                <div class="input-field col s12 m6">
                    <input type="checkbox" class="value" id="respectNightMode" name="respectNightMode" />
                    <span for="respectNightMode" class="translate">respect_night_mode_txt</span>
                </div>
            </div>

			<div class="row" style="padding: 4px">
				<div class="input-field col s12 m6">
					<input type="checkbox" class="value" id="clipNegativeValues" name="clipNegativeValues" />
					<span for="clipNegativeValues" class="translate">clip_negative_values_txt</span>
				</div>
			</div>
			<div class="row" style="padding: 4px">
				<div class="input-field col s12 m6 l3">
					<label for="retrievalRate" class="translate">retrieval_rate_txt</label>
					<input type="number" class="value" id="retrievalRate" min="2" max="3600" step="1" placeholder="10" />
				</div>
				<div class="input-field col s12 m6 l3">
					<select id="retrievalType" class="value">
						<option value="data" class="translate">retrieval_type_data_txt</option>
						<option value="average" class="translate">retrieval_type_average_txt</option>
					</select>
					<label for="retrievalType" class="translate">retrieval_type_txt</label>
				</div>
			</div>

			<div class="row" style="padding: 4px">
				<span for="access_data" class="translate"
					style="font-size: 1rem; border-radius: 4px; margin-left: 0.5em"
					class="translate">poll_warning_txt</span>
			</div>
			<div class="row" style="padding: 4px">
				<span for="access_data" class="translate"
					style="font-size: 1rem; border-radius: 4px; margin-left: 0.5em"
					class="translate">polling_hint_txt</span>
			</div>
		</div>

	</div>

</body>

</html>
